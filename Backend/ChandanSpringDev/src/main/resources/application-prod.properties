# Production Properties - Render
server.port=8080

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:ChandanSpringDev}

# Increase MongoDB connection timeout to handle slow cold starts on Render free tier
spring.data.mongodb.auto-index-creation=true

# Use a secure, environment-provided secret
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email API Configuration (Resend)
resend.api-key=${RESEND_API_KEY}
# The Gmail/inbox that should receive contact form submissions
contact.recipient.email=${CONTACT_RECIPIENT_EMAIL:}

# CORS - can be restricted once you have your Render URL
spring.web.cors.allowed-origins=${FRONTEND_URLS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Max file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Serve uploaded static files
spring.web.resources.static-locations=file:uploads/

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
